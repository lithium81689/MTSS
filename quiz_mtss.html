<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTSS Quiz</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#f9f8f5;
  --text:#1a1a18;--text2:#5a5a56;--text3:#8a8a85;
  --border:#e0dfd8;--border2:#c8c7c0;
  --accent:#3b6fd4;--accent-bg:#e8eef9;--accent-text:#1e3d8a;
  --success:#2e7d4f;--success-bg:#e6f4ec;--success-border:#a8d8b8;
  --danger:#b52a2a;--danger-bg:#faeaea;--danger-border:#f0b0b0;
  --warning:#7a5500;--warning-bg:#fff8e6;--warning-border:#f0d080;
  --radius:8px;--radius-lg:14px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;height:56px}
header h1{font-size:16px;font-weight:600;color:var(--text)}
header .badge{font-size:12px;color:var(--text3);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px}
.container{max-width:760px;margin:0 auto;padding:2rem 1.5rem}
.score-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;margin-bottom:1.75rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.score-group{display:flex;gap:1.5rem}
.score-item{text-align:center}
.score-num{font-size:24px;font-weight:600;color:var(--text)}
.score-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.progress-wrap{flex:1;max-width:280px}
.progress-lbl{font-size:12px;color:var(--text3);margin-bottom:5px;display:flex;justify-content:space-between}
.progress-bar{height:6px;background:var(--surface2);border-radius:4px;border:1px solid var(--border);overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .3s}
.btn{padding:8px 18px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn:hover{background:var(--surface2);border-color:var(--text3)}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#2e5bb8;border-color:#2e5bb8}
.qcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1.25rem;transition:box-shadow .2s}
.qcard.done{opacity:.85}
.qmeta{display:flex;align-items:center;gap:8px;margin-bottom:.75rem}
.qnum{font-size:12px;color:var(--text3);font-weight:500}
.qtype{font-size:11px;padding:2px 8px;border-radius:12px;background:var(--accent-bg);color:var(--accent-text);font-weight:500}
.qtype.multi{background:#f0eaff;color:#5a2db5}
.qtext{font-size:15px;font-weight:500;color:var(--text);margin-bottom:1rem;line-height:1.55}
.opts{display:flex;flex-direction:column;gap:4px;margin-bottom:.75rem}
.opt{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:var(--radius);cursor:pointer;border:1px solid transparent;transition:background .1s,border-color .1s}
.opt:hover:not(.locked){background:var(--surface2);border-color:var(--border)}
.opt.locked{cursor:default}
.opt input{margin-top:3px;cursor:pointer;flex-shrink:0;accent-color:var(--accent)}
.opt.locked input{cursor:default}
.opt label{font-size:14px;color:var(--text);cursor:pointer;line-height:1.5}
.opt.locked label{cursor:default}
.opt.correct{background:var(--success-bg);border-color:var(--success-border)}
.opt.correct label{color:var(--success)}
.opt.wrong{background:var(--danger-bg);border-color:var(--danger-border)}
.opt.wrong label{color:var(--danger)}
.opt.missed{background:var(--warning-bg);border-color:var(--warning-border)}
.opt.missed label{color:var(--warning)}
.verify-row{display:flex;align-items:center;gap:10px}
.feedback{font-size:13px;font-weight:600;padding:4px 10px;border-radius:var(--radius)}
.feedback.ok{color:var(--success);background:var(--success-bg)}
.feedback.no{color:var(--danger);background:var(--danger-bg)}
.legend{font-size:12px;color:var(--text3);margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.legend span{display:inline-flex;align-items:center;gap:4px;margin-right:10px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.dot.g{background:var(--success)}.dot.r{background:var(--danger)}.dot.y{background:var(--warning)}
.finish-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2rem;text-align:center;margin-bottom:2rem}
.finish-card h2{font-size:22px;font-weight:600;margin-bottom:.5rem}
.finish-card p{color:var(--text2);margin-bottom:1.25rem}
.big-score{font-size:48px;font-weight:700;color:var(--accent);margin:.5rem 0}
</style>
</head>

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

let questions=[];
let answered={};
let score=0;

function init(){
  questions=shuffle(ALL_QUESTIONS).map(q=>({...q,opts:shuffle(q.opts)}));
  answered={};score=0;
  renderAll();
}

function renderAll(){
  const total=questions.length;
  document.getElementById('hbadge').textContent=total+' domande';
  const app=document.getElementById('app');
  let html='<div class="score-bar"><div class="score-group"><div class="score-item"><div class="score-num" id="sd-score">0</div><div class="score-lbl">Corrette</div></div><div class="score-item"><div class="score-num" id="sd-done">0</div><div class="score-lbl">Risposte</div></div><div class="score-item"><div class="score-num" id="sd-tot">'+total+'</div><div class="score-lbl">Totale</div></div></div><div class="progress-wrap"><div class="progress-lbl"><span>Avanzamento</span><span id="sd-pct">0%</span></div><div class="progress-bar"><div class="progress-fill" id="sd-fill" style="width:0%"></div></div></div><button class="btn" onclick="init()">&#8635; Nuovo tentativo</button></div>';
  questions.forEach((q,qi)=>{
    const isMulti=q.type==='multi';
    html+=`<div class="qcard" id="qcard-${qi}"><div class="qmeta"><span class="qnum">Domanda ${qi+1}/${total}</span><span class="qtype ${isMulti?'multi':''}">${isMulti?'risposta multipla':'risposta singola'}</span></div><div class="qtext">${q.q}</div><div class="opts" id="opts-${qi}">`;
    q.opts.forEach((o,oi)=>{
      html+=`<div class="opt" id="opt-${qi}-${oi}" onclick="toggleOpt(${qi},${oi})"><input type="${isMulti?'checkbox':'radio'}" name="q${qi}" id="i${qi}-${oi}" value="${oi}"><label for="i${qi}-${oi}">${o.t}</label></div>`;
    });
    html+=`</div><div class="verify-row"><button class="btn btn-primary" id="vbtn-${qi}" onclick="verify(${qi})">Verifica</button><span class="feedback" id="fb-${qi}" style="display:none"></span></div><div class="legend" style="display:none" id="leg-${qi}"><span><span class="dot g"></span>Corretta selezionata</span><span><span class="dot r"></span>Sbagliata selezionata</span><span><span class="dot y"></span>Corretta non selezionata</span></div></div>`;
  });
  app.innerHTML=html;
}

function toggleOpt(qi,oi){
  if(answered[qi]!==undefined) return;
  const q=questions[qi];
  if(q.type==='single'){
    document.querySelectorAll(`input[name="q${qi}"]`).forEach(el=>el.checked=false);
  }
  const inp=document.getElementById(`i${qi}-${oi}`);
  inp.checked=!inp.checked;
}

function verify(qi){
  const q=questions[qi];
  const isMulti=q.type==='multi';
  let selected=[];
  if(isMulti){
    document.querySelectorAll(`input[name="q${qi}"]:checked`).forEach(el=>selected.push(parseInt(el.value)));
  } else {
    const el=document.querySelector(`input[name="q${qi}"]:checked`);
    if(el) selected=[parseInt(el.value)];
  }
  if(!selected.length) return;
  const correctIdxs=q.opts.map((o,i)=>o.c?i:-1).filter(i=>i>=0);
  const isCorrect=isMulti
    ? correctIdxs.length===selected.length && correctIdxs.every(i=>selected.includes(i))
    : q.opts[selected[0]]&&q.opts[selected[0]].c;
  answered[qi]=isCorrect;
  if(isCorrect) score++;
  q.opts.forEach((o,oi)=>{
    const div=document.getElementById(`opt-${qi}-${oi}`);
    div.classList.add('locked');
    document.getElementById(`i${qi}-${oi}`).disabled=true;
    if(o.c&&selected.includes(oi)) div.classList.add('correct');
    else if(!o.c&&selected.includes(oi)) div.classList.add('wrong');
    else if(o.c&&!selected.includes(oi)) div.classList.add('missed');
  });
  document.getElementById(`vbtn-${qi}`).disabled=true;
  const fb=document.getElementById(`fb-${qi}`);
  fb.style.display='inline-flex';
  fb.className='feedback '+(isCorrect?'ok':'no');
  fb.textContent=isCorrect?'✓ Corretto!':'✗ Risposta errata';
  document.getElementById(`leg-${qi}`).style.display='block';
  document.getElementById(`qcard-${qi}`).classList.add('done');
  updateScore();
}

function updateScore(){
  const done=Object.keys(answered).length;
  const total=questions.length;
  const pct=Math.round(done/total*100);
  document.getElementById('sd-score').textContent=score;
  document.getElementById('sd-done').textContent=done;
  document.getElementById('sd-fill').style.width=pct+'%';
  document.getElementById('sd-pct').textContent=pct+'%';
}

init();
</script>
